version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
